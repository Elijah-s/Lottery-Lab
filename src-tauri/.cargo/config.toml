# Pin the C compiler/linker to Apple's toolchain. A shadowing `cc` shim on
# the user's PATH (e.g. the `@cjh0/cc-cli` Node package installed via
# Homebrew) is not a real C compiler and breaks every native build script.
# Using an absolute path here sidesteps the PATH shadow without asking the
# user to uninstall the shim.

[env]
CC = "/usr/bin/cc"
CXX = "/usr/bin/c++"

[target.aarch64-apple-darwin]
linker = "/usr/bin/cc"

[target.x86_64-apple-darwin]
linker = "/usr/bin/cc"
